function flatAll(nodes, acc = []) {
  for (const n of nodes) {
    acc.push({ id: n.id, name: n.name, path: n.path });
    if (n.children && n.children.length) flatAll(n.children, acc);
  }
  return acc;
}

async function callGroq(apiKey, prompt) {
  const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      messages: [{ role: "user", content: prompt }],
      temperature: 0.7,
      max_tokens: 2048
    })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  const raw = d.choices?.[0]?.message?.content || "";
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("Réponse invalide, réessaie.");
  return JSON.parse(match[0]);
}

      ]);

      setAudiences(p1.audiences || []);
      setInMarket((p2.inmarket || []).map(id => ALL_IM.find(n => n.id === id)).filter(Boolean));
      setAffinity((p2.affinity || []).map(id => ALL_AFF.find(n => n.id === id)).filter(Boolean));
      setStep("results");
    } catch(e) {
      setError(e.message);
      setStep("form");
    }
  }

  const inp = { width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "10px", padding: "11px 13px", color: "#f1f5f9", fontSize: "14px", outline: "none", fontFamily: "inherit", transition: "border-color .2s" };
  const imExport = inMarket.map(s => `• ${s.path}`).join("\n");
  const affExport = affinity.map(s => `• ${s.path}`).join("\n");
  const fullExport = [audiences.map((a,i) => `[AUDIENCE ${i+1}] ${a.name}\nMots-clés: ${(a.keywords||[]).join(", ")}`).join("\n\n"), imExport ? `\n=== IN-MARKET ===\n${imExport}` : "", affExport ? `\n=== AFFINITÉ ===\n${affExport}` : ""].join("\n");

  return (
    <div style={{ minHeight: "100vh", background: "#070b13" }}>
      <div style={{ borderBottom: "1px solid rgba(255,255,255,0.06)", padding: "14px 24px", display: "flex", alignItems: "center", gap: "10px", background: "rgba(255,255,255,0.015)", position: "sticky", top: 0, backdropFilter: "blur(10px)", zIndex: 10 }}>
        <div style={{ width: "30px", height: "30px", borderRadius: "8px", background: "linear-gradient(135deg,#6366f1,#8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "14px" }}>🎯</div>
        <div>
          <div style={{ fontWeight: "700", fontSize: "13px", color: "#f1f5f9" }}>Audience Builder</div>
          <div style={{ fontSize: "10px", color: "#334155" }}>Google Ads · Groq · Gratuit</div>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: "8px" }}>
          {step === "results" && (
            <button onClick={() => { setStep("form"); setAudiences([]); setInMarket([]); setAffinity([]); setError(null); }}
              style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: "#64748b", borderRadius: "8px", padding: "5px 12px", fontSize: "11px" }}>
              ← Retour
            </button>
          )}
          <button onClick={() => { if(window.confirm("Changer de clé API ?")) setApiKey(""); }}
            style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", color: "#334155", borderRadius: "8px", padding: "5px 10px", fontSize: "11px" }}>
            🔑 Clé API
          </button>
        </div>
      </div>

      <div style={{ maxWidth: "700px", margin: "0 auto", padding: "28px 20px" }}>

        {step === "form" && (
          <div style={{ animation: "fade .35s ease" }}>
            <div style={{ textAlign: "center", marginBottom: "28px" }}>
              <h1 style={{ fontSize: "22px", fontWeight: "800", marginBottom: "8px", background: "linear-gradient(135deg,#f1f5f9,#6366f1)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", lineHeight: "1.3" }}>Génère ton plan d'audiences<br/>Google Ads complet</h1>
              <p style={{ color: "#334155", fontSize: "13px" }}>3 audiences personnalisées + segments In-Market & Affinité sélectionnés par l'IA</p>
            </div>

            {error && (
              <div style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", borderRadius: "10px", padding: "12px 16px", color: "#f87171", fontSize: "13px", marginBottom: "18px" }}>
                ⚠️ {error}
              </div>
            )}

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "14px", marginBottom: "16px" }}>
              {[["Marque", brand, setBrand, "ex: Decathlon, Nike…"], ["Produit / Service", product, setProduct, "ex: chaussures de running…"]].map(([label, val, set, ph]) => (
                <div key={label}>
                  <label style={{ display: "block", color: "#475569", fontSize: "10px", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: "700", marginBottom: "6px" }}>{label}</label>
                  <input value={val} onChange={e => set(e.target.value)} placeholder={ph} style={inp}
                    onFocus={e => e.target.style.borderColor = "#6366f1"} onBlur={e => e.target.style.borderColor = "rgba(255,255,255,0.1)"} />
                </div>
              ))}
            </div>

            <div style={{ marginBottom: "24px" }}>
              <label style={{ display: "block", color: "#475569", fontSize: "10px", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: "700", marginBottom: "8px" }}>Objectif de campagne</label>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "8px" }}>
                {OBJECTIVES.map(o => (
                  <div key={o.id} onClick={() => setObjective(o.id)}
                    style={{ padding: "12px 8px", borderRadius: "10px", border: `1px solid ${objective === o.id ? "#6366f1" : "rgba(255,255,255,0.07)"}`, background: objective === o.id ? "rgba(99,102,241,0.1)" : "rgba(255,255,255,0.02)", cursor: "pointer", textAlign: "center", transition: "all .15s" }}>
                    <div style={{ fontSize: "20px", marginBottom: "5px" }}>{o.icon}</div>
                    <div style={{ color: objective === o.id ? "#a5b4fc" : "#94a3b8", fontWeight: "600", fontSize: "12px" }}>{o.label}</div>
                    <div style={{ color: "#334155", fontSize: "10px", marginTop: "2px" }}>{o.desc}</div>
                  </div>
                ))}
              </div>
            </div>

            <button onClick={() => canSubmit && generate()} disabled={!canSubmit}
              style={{ width: "100%", background: canSubmit ? "linear-gradient(135deg,#6366f1,#8b5cf6)" : "rgba(255,255,255,0.04)", border: "none", borderRadius: "12px", padding: "14px", color: canSubmit ? "#fff" : "#2d3748", fontSize: "15px", fontWeight: "700", cursor: canSubmit ? "pointer" : "not-allowed" }}>
              ✨ Générer mon plan d'audiences complet
            </button>
          </div>
        )}

        {step === "loading" && (
          <div style={{ textAlign: "center", padding: "100px 0", animation: "fade .3s ease" }}>
            <div style={{ width: "48px", height: "48px", border: "3px solid rgba(99,102,241,0.15)", borderTop: "3px solid #6366f1", borderRadius: "50%", margin: "0 auto 22px", animation: "spin .7s linear infinite" }}></div>
            <div style={{ color: "#6366f1", fontWeight: "700", fontSize: "16px", marginBottom: "8px" }}>Génération en cours…</div>
            <div style={{ color: "#334155", fontSize: "13px" }}>Audiences personnalisées + In-Market + Affinité</div>
          </div>
        )}

        {step === "results" && (
          <div style={{ animation: "fade .4s ease" }}>
            <div style={{ background: "rgba(99,102,241,0.07)", border: "1px solid rgba(99,102,241,0.18)", borderRadius: "12px", padding: "14px 18px", marginBottom: "22px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: "12px" }}>
              <div>
                <div style={{ color: "#a5b4fc", fontWeight: "700", fontSize: "14px" }}>Plan généré pour <span style={{ color: "#818cf8" }}>{brand}</span></div>
                <div style={{ color: "#334155", fontSize: "12px", marginTop: "2px" }}>{product} · {OBJECTIVES.find(o=>o.id===objective)?.label}</div>
              </div>
              <CopyBtn text={fullExport} label="Tout exporter" />
            </div>

            <div style={{ color: "#475569", fontSize: "10px", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: "700", marginBottom: "10px" }}>🎯 Audiences personnalisées</div>
            {audiences.map((a, i) => <AudienceCard key={i} a={a} idx={i} />)}

            <div style={{ marginTop: "26px", paddingTop: "22px", borderTop: "1px solid rgba(255,255,255,0.05)" }}>
              <div style={{ color: "#475569", fontSize: "10px", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: "700", marginBottom: "16px" }}>✨ Segments recommandés par l'IA</div>

              {inMarket.length > 0 && (
                <div style={{ background: "rgba(99,102,241,0.04)", border: "1px solid rgba(99,102,241,0.12)", borderRadius: "12px", padding: "14px 16px", marginBottom: "12px" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "10px" }}>
                    <div style={{ color: "#6366f1", fontSize: "11px", fontWeight: "700", textTransform: "uppercase", letterSpacing: "0.08em" }}>
                      🛒 In-Market <span style={{ background: "rgba(99,102,241,0.2)", borderRadius: "10px", padding: "1px 7px", fontSize: "10px" }}>{inMarket.length}</span>
                    </div>
                    <CopyBtn text={`=== IN-MARKET ===\n${imExport}`} label="Exporter" />
                  </div>
                  <div>{inMarket.map(s => <Chip key={s.id} label={s.name} color="#6366f1" onRemove={() => setInMarket(prev => prev.filter(x => x.id !== s.id))} />)}</div>
                </div>
              )}

              {affinity.length > 0 && (
                <div style={{ background: "rgba(236,72,153,0.04)", border: "1px solid rgba(236,72,153,0.12)", borderRadius: "12px", padding: "14px 16px" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "10px" }}>
                    <div style={{ color: "#ec4899", fontSize: "11px", fontWeight: "700", textTransform: "uppercase", letterSpacing: "0.08em" }}>
                      💜 Affinité <span style={{ background: "rgba(236,72,153,0.2)", borderRadius: "10px", padding: "1px 7px", fontSize: "10px" }}>{affinity.length}</span>
                    </div>
                    <CopyBtn text={`=== AFFINITÉ ===\n${affExport}`} label="Exporter" />
                  </div>
                  <div>{affinity.map(s => <Chip key={s.id} label={s.name} color="#ec4899" onRemove={() => setAffinity(prev => prev.filter(x => x.id !== s.id))} />)}</div>
                </div>
              )}
            </div>

            <div style={{ marginTop: "18px", padding: "12px 16px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: "10px", color: "#334155", fontSize: "11px", lineHeight: "1.7" }}>
              💡 <strong style={{ color: "#475569" }}>Personnalisées</strong> → Google Ads → Outils → Gestionnaire d'audiences → Créer &nbsp;·&nbsp; <strong style={{ color: "#475569" }}>In-Market / Affinité</strong> → Onglet Audiences dans ta campagne Display ou Demand Gen
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
